  el.innerHTML = feedbacks.map((fb, i) => `
    <div class="feedback-item ${fb.used ? 'used' : ''}">
      <div style="flex:1">
        <div class="feedback-item-text">${esc(fb.text)}</div>
        <div class="feedback-item-meta">${fb.used ? '✓ 반영됨' + (fb.used_at_round ? ' (Round ' + fb.used_at_round + ')' : '') : '⏳ 다음 라운드에 반영 예정'}</div>
      </div>
      ${!fb.used ? `<button class="feedback-item-del" onclick="deleteFeedback(${i})" title="삭제">✕</button>` : ''}
    </div>
  `).join('');
}

async function submitFeedback() {
  if (!currentSessionId) return;
  const ta = document.getElementById('feedbackText');
  const text = ta.value.trim();
  if (!text) return;
  try {
    await fetch(`/api/code-review/session/${currentSessionId}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    ta.value = ''; ta.style.height = '';
    await loadFeedback();
  } catch {}
}

async function deleteFeedback(idx) {
  if (!currentSessionId) return;
  try {
    await fetch(`/api/code-review/session/${currentSessionId}/feedback/${idx}`, { method: 'DELETE' });
    await loadFeedback();
  } catch {}
}

// ── Provider Status ────────────────────────────────────────────
let providerPanelOpen = false;

function toggleProviderPanel() {
  providerPanelOpen = !providerPanelOpen;
  document.getElementById('providerPanel').classList.toggle('open', providerPanelOpen);
  if (providerPanelOpen) loadProviderStatus();
}

document.addEventListener('click', e => {
  if (providerPanelOpen && !e.target.closest('#providerPanel') && !e.target.closest('#providerBtn')) {
    providerPanelOpen = false;
    document.getElementById('providerPanel').classList.remove('open');
  }
});

async function loadProviderStatus() {
  try {
    const data = await fetch('/api/provider-status').then(r => r.json());
    renderProviderStatus(data);
  } catch {
    document.getElementById('providerRows').innerHTML =
      '<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center;">불러오기 실패</div>';
  }
}

function renderProviderStatus(data) {
  const providers = [
    { key: 'claude', icon: '🤖' },
    { key: 'gemini_cli', icon: '💎' },
    { key: 'gemini_api', icon: '💎' },
    { key: 'codex_cli', icon: '⚡' },
    { key: 'openai_api', icon: '🧠' },
  ];

  const hasErr = providers.some(p => { const s = data[p.key]?.status; return s === 'quota_exhausted' || s === 'rate_limited'; });
  const allOff = providers.every(p => !data[p.key]?.available);
  const dot = document.getElementById('providerDot');
  dot.className = 'dot ' + (allOff ? '' : hasErr ? 'warn' : 'ok');

  // 구독 참고 단가
  const SUBSCRIPTION = {
    claude:      { plan: 'Max $100/월', color: '#22c55e' },
    gemini_cli:  { plan: 'Google AI Premium $19.99/월 포함', color: '#94a3b8' },
    gemini_api:  { plan: 'Flash: $0.075/1M입력 · $0.30/1M출력', color: '#94a3b8' },
    codex_cli:   { plan: 'ChatGPT Plus $20/월 포함', color: '#94a3b8' },
    openai_api:  { plan: 'GPT-4o: $2.50/1M입력 · $10/1M출력', color: '#94a3b8' },
  };

  const rows = providers.map(({ key, icon }) => {
    const p = data[key];
    if (!p) return '';
    const sub = SUBSCRIPTION[key];
    const dotClass = !p.available ? 'off' : p.status === 'ok' || p.status === 'configured' ? 'ok' :
                     p.status === 'quota_exhausted' || p.status === 'rate_limited' ? 'warn' : 'err';
    const statusText = {
      ok: '✅ 정상', configured: '✅ 설정됨', not_found: '⚫ 미설치',
      no_key: '⚫ API 키 없음', quota_exhausted: '⚠️ 쿼터 소진', rate_limited: '⚠️ 속도 제한'
    }[p.status] || p.status;

    let costHtml = '';
    let detail = '';

    if (key === 'claude' && p.available && p.cost_usd > 0) {
      const from = p.log_date_from ? p.log_date_from.slice(5).replace('-','/') : '?';
      const to = p.log_date_to ? p.log_date_to.slice(5).replace('-','/') : '?';
      const planColor = p.monthly_estimate > 200 ? '#ef4444' : p.monthly_estimate > 100 ? '#f59e0b' : '#22c55e';
      costHtml = `
        <div style="margin-top:6px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:11px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="color:#94a3b8">API 환산 비용 (${from}~${to}, ${p.log_days}일)</span>
            <span style="color:#e2e8f0;font-weight:600">$${p.cost_usd.toFixed(2)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="color:#94a3b8">일 평균</span>
            <span style="color:#e2e8f0">$${p.cost_per_day.toFixed(2)}/일</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="color:#94a3b8">월 환산 추정</span>
            <span style="color:${planColor};font-weight:700">~$${p.monthly_estimate}/월</span>
          </div>
          <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:5px;color:#6b7280;">
            참고: <span style="color:${sub.color}">${sub.plan}</span> · 구독 사용 시 실제 과금 없음
          </div>
        </div>`;
    } else if (key === 'gemini_cli' && p.status === 'quota_exhausted') {
      detail = `리셋까지: <strong>${p.reset_in || '?'}</strong>`;
    } else if (!p.available) {
      detail = key.includes('api') ? 'API 키 미설정 — .env에 추가' : 'CLI 미설치';
    }

    const subNote = !costHtml && p.available && sub ? `<div style="font-size:10px;color:#4b5563;margin-top:2px;">${sub.plan}</div>` : '';

    return `<div class="provider-row">
      <div class="provider-dot ${dotClass}"></div>
      <div class="provider-info" style="min-width:0;flex:1;">
        <div class="provider-name">${icon} ${p.label}</div>
        <div class="provider-detail">${statusText}${detail ? ' &nbsp;·&nbsp; ' + detail : ''}</div>
        ${subNote}${costHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('providerRows').innerHTML = rows;
  const t = new Date(data._checked_at);
  document.getElementById('providerCheckedAt').textContent = `${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 기준`;
}

// 페이지 로드 시 백그라운드에서 상태 조회 (dot 업데이트용)
loadProviderStatus();
</script>
</body>
